name: Refresh Team Calendars

on:
  schedule:
    - cron: "25 9 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  refresh-team-calendars:
    runs-on: ubuntu-latest

    env:
      MANIFEST_PATH: config/tracked_proteams_2026.csv

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Refresh tracked team calendar outputs
        id: refresh
        run: |
          set +e
          python scripts/build_all_proteam_calendar_ev.py --manifest-path "$MANIFEST_PATH" 2>&1 | tee /tmp/team_calendar_batch.log
          status=${PIPESTATUS[0]}
          failed_team_slugs=$(grep '^FAILED_TEAM_SLUGS=' /tmp/team_calendar_batch.log | tail -n 1 | cut -d= -f2-)
          echo "failed_team_slugs=$failed_team_slugs" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Commit updated calendar outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/team_calendars data/team_results data/team_ev; then
            echo "No team calendar output changes to commit."
            exit 0
          fi
          git add data/team_calendars data/team_results data/team_ev
          git commit -m "Refresh tracked team calendar outputs"
          git push

      - name: Open or update refresh failure alert
        if: ${{ failure() }}
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: Team calendar refresh failed
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FAILED_TEAM_SLUGS: ${{ steps.refresh.outputs.failed_team_slugs }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = "automation-alert";
            const title = process.env.ISSUE_TITLE;
            const failedTeamSlugs = process.env.FAILED_TEAM_SLUGS || "";
            const body = [
              `@${owner} the scheduled team calendar refresh failed.`,
              "",
              failedTeamSlugs ? `Failed teams: ${failedTeamSlugs}` : "Failed teams: unavailable",
              "",
              `Workflow: ${context.workflow}`,
              `Event: ${context.eventName}`,
              `Run: ${process.env.RUN_URL}`,
              `UTC time: ${new Date().toISOString()}`,
            ].join("\n");

            const labels = await github.paginate(github.rest.issues.listLabelsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            if (!labels.some((label) => label.name === labelName)) {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: labelName,
                color: "B60205",
                description: "Automated workflow failure notifications",
              });
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [labelName],
              });
            }

      - name: Close refresh failure alert after recovery
        if: ${{ success() }}
        uses: actions/github-script@v7
        env:
          ISSUE_TITLE: Team calendar refresh failed
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = "automation-alert";
            const title = process.env.ISSUE_TITLE;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: labelName,
              per_page: 100,
            });
            const matches = openIssues.filter((issue) => issue.title === title);

            for (const issue of matches) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body: "The latest team calendar refresh succeeded, so this alert is being closed automatically.",
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: issue.number,
                state: "closed",
              });
            }
